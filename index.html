<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Friend Follow Official</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* 🌈 พาสเทลเนียน */
  background: linear-gradient(135deg, #ffe6f0, #e6f0ff, #f3e7ff);
  background-size: 200% 200%;
  animation: bgMove 6s ease infinite;

  font-family: 'Mali', sans-serif;
}

/* 🎨 พื้นหลังไหล */
@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 💎 กล่อง */
.container {
  text-align: center;
}

/* 💖 โลโก้ */
.logo {
  font-size: 22px;
  font-weight: bold;
  background: linear-gradient(45deg, #ff4fa3, #ff7ecb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: float 2s ease-in-out infinite;
}

/* 🫧 เด้งเบา ๆ */
@keyframes float {
  50% { transform: translateY(-5px); }
}

/* 🔥 loader หลัก */
.loader {
  position: relative;
  width: 80px;
  height: 80px;
  margin: 20px auto;
}

/* วงนอก */
.outer {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 5px solid rgba(255,79,163,0.2);
  border-top: 5px solid #ff4fa3;

  animation: spin 1s linear infinite;

  box-shadow:
    0 0 20px rgba(255,79,163,0.4),
    0 0 40px rgba(255,79,163,0.2);
}

/* วงใน */
.inner {
  position: absolute;
  top: 20%;
  left: 20%;
  width: 60%;
  height: 60%;
  border-radius: 50%;
  border: 4px solid rgba(255,120,200,0.2);
  border-bottom: 4px solid #ff7ecb;

  animation: spinReverse 1.5s linear infinite;
}

/* animation */
@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes spinReverse {
  to { transform: rotate(-360deg); }
}

/* ✨ ข้อความ */
.text {
  font-size: 14px;
  color: #666;
  margin-top: 10px;
  transition: 0.3s;
}

/* 🫧 bubble เบา ๆ */
.bubbles span {
  position: absolute;
  bottom: -100px;
  width: 12px;
  height: 12px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  animation: bubble 12s linear infinite;
}

.bubbles span:nth-child(1){ left:10%; }
.bubbles span:nth-child(2){ left:30%; }
.bubbles span:nth-child(3){ left:60%; }
.bubbles span:nth-child(4){ left:85%; }

@keyframes bubble {
  0% { transform: translateY(0); opacity:0; }
  20% { opacity:1; }
  100% { transform: translateY(-120vh); opacity:0; }
}
</style>

</head>
<body>

<div class="bubbles">
  <span></span><span></span><span></span><span></span>
</div>

<div class="container">
  <div class="logo">Friend Follow Official</div>

  <div class="loader">
    <div class="outer"></div>
    <div class="inner"></div>
  </div>

  <div class="text" id="loadingText">💖 กำลังเช็คราคาให้อยู่น้า...</div>
</div>

<script>
let target = "https://script.google.com/macros/s/AKfycbzpLxgX_m8jw12zvWsirxar4mL-ZCSMXICybCd90_-p-o44p9KLUJiQn6XDY2mfzftO/exec";

// 🔄 ข้อความเปลี่ยน
let texts = [
  "💖 กำลังเช็คราคาให้อยู่น้า...",
  "✨ กำลังหาดีลที่คุ้มที่สุด...",
  "🎀 โหลดโปรโมชั่นพิเศษ...",
  "💫 ใกล้เสร็จแล้วนิดนึง...",
  "🚀 พร้อมแล้ว!"
];

let i = 0;
setInterval(() => {
  document.getElementById("loadingText").innerText = texts[i];
  i = (i + 1) % texts.length;
}, 1200);

// ⏳ เข้าเว็บแบบเนียน
setTimeout(() => {
  window.location.href = target;
}, 2200);
</script>

</body>
</html>
