<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Friend Follow Official</title>

<link rel="preconnect" href="https://script.google.com">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(135deg, #ffe6f0, #e6f0ff, #f3e7ff);
  background-size: 200% 200%;
  animation: bgMove 6s ease infinite;

  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  opacity: 0;
  transition: opacity 0.5s ease;
}

@keyframes bgMove {
  50% { background-position: 100% 50%; }
}

/* container */
.container {
  text-align: center;
  width: 80%;
  max-width: 320px;
}

/* logo */
.logo {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 20px;
}

/* 🍏 spinner */
.spinner {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 4px solid rgba(0,0,0,0.1);
  border-top: 4px solid #ff4fa3;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* 📊 progress bar */
.bar {
  width: 100%;
  height: 8px;
  background: rgba(0,0,0,0.08);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

.fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff4fa3, #ff7ecb);
  border-radius: 10px;
  transition: width 0.3s ease;
}

/* % */
.percent {
  margin-top: 8px;
  font-size: 14px;
  color: #555;
}

/* text */
.text {
  margin-top: 10px;
  font-size: 13px;
  color: #777;
  transition: 0.3s;
}
</style>

</head>
<body>

<div class="container">
  <div class="logo">Friend Follow Official</div>

  <div class="spinner"></div>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <div class="percent" id="percent">0%</div>

  <div class="text" id="loadingText">กำลังโหลด...</div>
</div>

<script>
let target = "https://script.google.com/macros/s/AKfycbzpLxgX_m8jw12zvWsirxar4mL-ZCSMXICybCd90_-p-o44p9KLUJiQn6XDY2mfzftO/exec";

// fade in
window.onload = () => {
  document.body.style.opacity = 1;
};

// 🧠 fake progress แบบเนียน
let progress = 0;
let fill = document.getElementById("fill");
let percent = document.getElementById("percent");

let texts = [
  "💖 กำลังเช็คราคา...",
  "✨ กำลังหาดีลที่ดีที่สุด...",
  "🎀 โหลดโปรโมชั่น...",
  "💫 ประมวลผลข้อมูล...",
  "🚀 ใกล้เสร็จแล้ว..."
];

let i = 0;

// progress loop
let interval = setInterval(() => {
  progress += Math.random() * 15;

  if (progress >= 100) {
    progress = 100;
    clearInterval(interval);

    // fade out
    document.body.style.opacity = 0;

    setTimeout(() => {
      window.location.href = target;
    }, 400);
  }

  fill.style.width = progress + "%";
  percent.innerText = Math.floor(progress) + "%";

}, 300);

// เปลี่ยนข้อความ
setInterval(() => {
  document.getElementById("loadingText").innerText = texts[i];
  i = (i + 1) % texts.length;
}, 1000);
</script>

</body>
</html>
