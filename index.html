<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Friend Follow Official</title>

<!-- ⚡ preload -->
<link rel="preconnect" href="https://script.google.com">
<link rel="dns-prefetch" href="https://script.google.com">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(135deg, #ffe6f0, #e6f0ff, #f3e7ff);
  background-size: 200% 200%;
  animation: bgMove 6s ease infinite;

  font-family: 'Mali', sans-serif;

  opacity: 0;
  transition: opacity 0.6s ease;
}

/* 🌈 background animation */
@keyframes bgMove {
  50% { background-position: 100% 50%; }
}

/* 💎 container */
.container {
  text-align: center;
}

/* 💖 logo */
.logo {
  font-size: 22px;
  font-weight: bold;
  background: linear-gradient(45deg, #ff4fa3, #ff7ecb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: float 2s ease-in-out infinite;
}

@keyframes float {
  50% { transform: translateY(-5px); }
}

/* 🔥 loader */
.loader {
  position: relative;
  width: 85px;
  height: 85px;
  margin: 20px auto;
}

/* outer */
.outer {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 5px solid rgba(255,79,163,0.2);
  border-top: 5px solid #ff4fa3;
  animation: spin 1s linear infinite;

  box-shadow:
    0 0 25px rgba(255,79,163,0.5),
    0 0 50px rgba(255,79,163,0.2);
}

/* inner */
.inner {
  position: absolute;
  top: 22%;
  left: 22%;
  width: 56%;
  height: 56%;
  border-radius: 50%;
  border: 4px solid rgba(255,120,200,0.2);
  border-bottom: 4px solid #ff7ecb;
  animation: spinReverse 1.5s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes spinReverse {
  to { transform: rotate(-360deg); }
}

/* 💬 text */
.text {
  font-size: 14px;
  color: #666;
  margin-top: 10px;
  transition: 0.3s;
}

/* 🫧 bubbles */
.bubbles span {
  position: absolute;
  bottom: -100px;
  width: 12px;
  height: 12px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  animation: bubble 12s linear infinite;
}

.bubbles span:nth-child(1){ left:10%; }
.bubbles span:nth-child(2){ left:30%; }
.bubbles span:nth-child(3){ left:60%; }
.bubbles span:nth-child(4){ left:85%; }

@keyframes bubble {
  0% { transform: translateY(0); opacity:0; }
  20% { opacity:1; }
  100% { transform: translateY(-120vh); opacity:0; }
}
</style>

</head>
<body>

<div class="bubbles">
  <span></span><span></span><span></span><span></span>
</div>

<div class="container">
  <div class="logo">Friend Follow Official</div>

  <div class="loader">
    <div class="outer"></div>
    <div class="inner"></div>
  </div>

  <div class="text" id="loadingText">💖 กำลังเช็คราคาให้อยู่น้า...</div>
</div>

<script>
let target = "https://script.google.com/macros/s/AKfycbzpLxgX_m8jw12zvWsirxar4mL-ZCSMXICybCd90_-p-o44p9KLUJiQn6XDY2mfzftO/exec";

// ✨ fade in
window.onload = () => {
  document.body.style.opacity = 1;
};

// 🔄 ข้อความเปลี่ยน
let texts = [
  "💖 กำลังเช็คราคาให้อยู่น้า...",
  "✨ กำลังหาดีลที่คุ้มที่สุด...",
  "🎀 โหลดโปรโมชั่นพิเศษ...",
  "💫 ใกล้เสร็จแล้วนิดนึง...",
  "🚀 พร้อมแล้ว!"
];

let i = 0;
setInterval(() => {
  document.getElementById("loadingText").innerText = texts[i];
  i = (i + 1) % texts.length;
}, 1100);

// 🚀 redirect แบบเนียน
setTimeout(() => {
  document.body.style.opacity = 0; // fade out
  setTimeout(() => {
    window.location.href = target;
  }, 500);
}, 2300);
</script>

</body>
</html>
