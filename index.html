<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Friend Follow Official</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #f3e7ff, #e7f3ff);
  font-family: 'Mali', sans-serif;
}

/* กล่อง */
.container {
  text-align: center;
}

/* โลโก้ */
.logo {
  font-size: 22px;
  font-weight: bold;
  background: linear-gradient(45deg, #ff4fa3, #ff7ecb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 🔥 วงหมุนหลัก */
.loader {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 6px solid rgba(255,79,163,0.2);
  border-top: 6px solid #ff4fa3;
  margin: 20px auto;

  animation: spin 1s linear infinite;

  box-shadow:
    0 0 20px rgba(255,79,163,0.4),
    0 0 40px rgba(255,79,163,0.2);
}

/* ✨ วงหมุนซ้อน (เท่ขึ้น) */
.loader::after {
  content: "";
  position: absolute;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 4px solid rgba(255,120,200,0.2);
  border-bottom: 4px solid #ff7ecb;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: spinReverse 1.5s linear infinite;
}

/* animation */
@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes spinReverse {
  to { transform: translate(-50%, -50%) rotate(-360deg); }
}

/* ข้อความ */
.text {
  font-size: 14px;
  color: #666;
  margin-top: 10px;
}

/* ข้อความย่อย */
.sub {
  font-size: 12px;
  color: #999;
  margin-top: 5px;
}

/* จุดกระพริบ ... */
.dots::after {
  content: "";
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0% { content: ""; }
  33% { content: "."; }
  66% { content: ".."; }
  100% { content: "..."; }
}
</style>

</head>
<body>

<div class="container">
  <div class="logo">Friend Follow Official</div>

  <div class="loader"></div>

  <div class="text">กำลังเช็คราคา<span class="dots"></span></div>
  <div class="sub">ระบบกำลังประมวลผลแบบเรียลไทม์</div>
</div>

<script>
// 🔗 ลิงก์ของคุณ
let target = "https://script.google.com/macros/s/AKfycbzpLxgX_m8jw12zvWsirxar4mL-ZCSMXICybCd90_-p-o44p9KLUJiQn6XDY2mfzftO/exec";

// ⏳ เด้งไปหน้าเว็บ
setTimeout(() => {
  window.location.href = target;
}, 2000);
</script>

</body>
</html>
