<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Friend Follow Official</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #f3e7ff, #e7f3ff);
  font-family: 'Mali', sans-serif;
  overflow: hidden;
}

/* loading */
.loading-box {
  text-align: center;
  z-index: 2;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #ff4fa3;
}

.loader {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 5px solid rgba(255,79,163,0.2);
  border-top: 5px solid #ff4fa3;
  animation: spin 1s linear infinite;
  margin: 15px auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* 💎 popup */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  padding: 25px;
  border-radius: 25px;
  text-align: center;
  width: 85%;
  max-width: 320px;
  z-index: 10;

  box-shadow:
    0 20px 60px rgba(0,0,0,0.2),
    0 0 30px rgba(255,79,163,0.3);

  opacity: 0;
  animation: pop 0.5s forwards;
}

@keyframes pop {
  to {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
}

.popup h2 {
  color: #ff4fa3;
  margin-bottom: 10px;
}

.popup p {
  font-size: 13px;
  color: #555;
}

.popup .price {
  font-size: 20px;
  font-weight: bold;
  color: #ff4fa3;
  margin: 10px 0;
}

/* ปุ่ม */
.line-btn {
  display: block;
  margin-top: 10px;
  padding: 10px;
  border-radius: 15px;
  text-decoration: none;
  color: white;
  font-weight: bold;

  background: linear-gradient(45deg, #00c300, #00e676);
}

/* ปุ่มปิด */
.close {
  margin-top: 8px;
  font-size: 12px;
  color: #999;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="loading-box">
  <div class="logo">Friend Follow Official</div>
  <div class="loader"></div>
</div>

<!-- 🎉 popup -->
<div class="popup" id="popup">
  <h2>🎉 Promotion ลูกค้าใหม่</h2>
  <p>🔥 ดันคลิปขึ้นฟีด</p>
  <div class="price">เพียง 129 บาท</div>
  <p>🇹🇭 วิวคนไทย 100%<br>🚀 เพิ่มโอกาสไวรัล</p>

  <a href="https://line.me/R/ti/p/@geg4960w" target="_blank" class="line-btn">
    💬 สั่งซื้อเลย
  </a>

  <div class="close" onclick="closePopup()">ข้าม</div>
</div>

<script>
let target = "https://script.google.com/macros/s/AKfycbxYiQO5LCOCDJjzTrotbAHyHfXELNkdzZav0vnMVoQZCcvnrUkSRGOXB8_1_UdrBOJM/exec";

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

/* ⏳ 3 วิ แล้วไปหน้าเว็บ */
setTimeout(() => {
  window.location.href = target;
}, 3000);
</script>

</body>
</html>
