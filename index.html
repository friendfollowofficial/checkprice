<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Friend Follow Official</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #f3e7ff, #e7f3ff);
  font-family: 'Mali', sans-serif;
  overflow: hidden;
}

/* 🔥 loading */
.container {
  text-align: center;
  z-index: 2;
}

.logo {
  font-size: 24px;
  font-weight: bold;
  background: linear-gradient(45deg, #ff4fa3, #ff7ecb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 💎 วงหมุน 2 ชั้น */
.loader {
  position: relative;
  width: 80px;
  height: 80px;
  margin: 20px auto;
}

.loader div {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 5px solid transparent;
}

.loader .outer {
  border-top: 5px solid #ff4fa3;
  animation: spin 1s linear infinite;
  box-shadow: 0 0 25px rgba(255,79,163,0.5);
}

.loader .inner {
  width: 60%;
  height: 60%;
  top: 20%;
  left: 20%;
  border-bottom: 5px solid #ff7ecb;
  animation: spinReverse 1.5s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes spinReverse {
  to { transform: rotate(-360deg); }
}

/* ✨ ข้อความ */
.text {
  font-size: 14px;
  color: #555;
  margin-top: 10px;
  transition: 0.3s;
}

/* popup */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.85);
  background: rgba(255,255,255,0.95);
  padding: 25px;
  border-radius: 25px;
  text-align: center;
  width: 85%;
  max-width: 320px;

  box-shadow:
    0 20px 60px rgba(0,0,0,0.2),
    0 0 40px rgba(255,79,163,0.3);

  opacity: 0;
  animation: pop 0.4s forwards;
}

@keyframes pop {
  to {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
}

.popup h2 {
  color: #ff4fa3;
}

.price {
  font-size: 24px;
  font-weight: bold;
  color: #ff4fa3;
  margin: 10px 0;
}

/* 👥 live */
.live {
  font-size: 12px;
  color: #ff4fa3;
  margin-top: 8px;
}

/* LINE */
.line-btn {
  display: block;
  margin-top: 12px;
  padding: 12px;
  border-radius: 15px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  background: linear-gradient(45deg, #00c300, #00e676);
}

/* close */
.close {
  margin-top: 8px;
  font-size: 11px;
  color: #aaa;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="container">
  <div class="logo">Friend Follow Official</div>

  <div class="loader">
    <div class="outer"></div>
    <div class="inner"></div>
  </div>

  <div class="text" id="loadingText">กำลังโหลดระบบ...</div>
</div>

<!-- 🎉 popup -->
<div class="popup" id="popup">
  <h2>🔥 โปรแรง ลูกค้าใหม่</h2>

  <div class="price">เริ่ม 129 บาท</div>

  <p>🇹🇭 วิวคนไทยแท้ 100%<br>🚀 เพิ่มโอกาสติด For You</p>

  <div class="live" id="liveText"></div>

  <a href="https://line.me/R/ti/p/@geg4960w" target="_blank" class="line-btn">
    💬 สั่งซื้อทันที
  </a>

  <div class="close" onclick="closePopup()">ข้าม</div>
</div>

<script>
let target = "https://script.google.com/macros/s/AKfycbxYiQO5LCOCDJjzTrotbAHyHfXELNkdzZav0vnMVoQZCcvnrUkSRGOXB8_1_UdrBOJM/exec";

// ❌ ปิด popup
function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// 👥 live
function updateLive() {
  let num = Math.floor(Math.random() * 30) + 50;
  document.getElementById("liveText").innerText =
    "👥 มี " + num + " คน กำลังดูโปรนี้";
}

// 🔥 ข้อความ loading เปลี่ยน
let texts = [
  "กำลังเช็คราคาที่ดีที่สุด...",
  "กำลังวิเคราะห์ระบบ...",
  "กำลังเตรียมโปรโมชั่น...",
  "กำลังโหลดข้อมูลแบบเรียลไทม์...",
  "ใกล้เสร็จแล้ว..."
];

let i = 0;
setInterval(() => {
  document.getElementById("loadingText").innerText = texts[i];
  i = (i + 1) % texts.length;
}, 1200);

updateLive();
setInterval(updateLive, 4000);

// ⏳ redirect
setTimeout(() => {
  window.location.href = target;
}, 3500);
</script>

</body>
</html>
